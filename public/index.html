<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZevWeather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;800&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --svelte-orange: #ff3e00;
        --svelte-bg: #111111;
      }
      body {
        font-family: "Crimson Pro", "Times New Roman", serif;
        background-color: var(--svelte-bg);
        color: white;
        overflow-x: hidden;
        overflow-y: auto;
      }
      .sans {
        font-family: "Inter", sans-serif;
      }
      .orange-glow {
        box-shadow: 0 0 20px rgba(255, 62, 0, 0.15);
      }

      /* Skeleton Animation */
      .skeleton {
        background: #1a1a1a;
        position: relative;
        overflow: hidden;
      }
      .skeleton::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        transform: translateX(-100%);
        background-image: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0,
          rgba(255, 255, 255, 0.03) 20%,
          rgba(255, 255, 255, 0.06) 60%,
          rgba(255, 255, 255, 0)
        );
        animation: shimmer 2s infinite;
      }
      @keyframes shimmer {
        100% {
          transform: translateX(100%);
        }
      }

      input:focus {
        border-color: var(--svelte-orange) !important;
        outline: none;
      }

      /* Cloud Animations */
      .cloud-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        opacity: 0.3;
      }

      .cloud {
        position: absolute;
        background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
        border-radius: 100px;
        filter: blur(40px);
        animation: floatCloud linear infinite;
      }

      @keyframes floatCloud {
        from {
          transform: translateX(-200px);
        }
        to {
          transform: translateX(calc(100vw + 200px));
        }
      }

      /* Icon Styling */
      .icon-flat {
        width: 44px;
        height: 44px;
        fill: var(--svelte-orange);
        filter: drop-shadow(0 0 10px rgba(255, 62, 0, 0.3));
      }

      @media (min-width: 768px) {
        .icon-flat {
          width: 56px;
          height: 56px;
        }
      }
    </style>
  </head>
  <body
    class="flex flex-col items-center min-h-screen p-4 md:p-8 lg:justify-center"
  >
    <!-- Cloud Animation Layer -->
    <div class="cloud-container" id="cloud-layer">
      <!-- Generated by JavaScript -->
    </div>

    <div class="w-full max-w-2xl flex flex-col relative z-10 py-6 md:py-0">
      <header class="mb-6 md:mb-10 flex items-center gap-3">
        <div
          class="w-8 h-8 bg-[#ff3e00] rounded-lg flex items-center justify-center font-bold text-lg sans"
        >
          Z
        </div>
        <h1 class="text-xl md:text-2xl font-semibold tracking-tight italic">
          Zev<span class="text-[#ff3e00] not-italic">Weather</span>
        </h1>
      </header>

      <!-- Skeleton State -->
      <div id="ghost-loader" class="space-y-6 md:space-y-10">
        <section class="space-y-4">
          <div class="h-3 w-24 skeleton rounded-full"></div>
          <div class="h-10 w-48 md:w-64 skeleton rounded-xl"></div>
          <div class="h-16 md:h-20 w-40 skeleton rounded-2xl"></div>
        </section>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="h-20 skeleton rounded-2xl"></div>
          <div class="h-20 skeleton rounded-2xl"></div>
          <div class="h-20 skeleton rounded-2xl"></div>
          <div class="h-20 skeleton rounded-2xl"></div>
        </div>
      </div>

      <!-- Real Content State -->
      <main id="app" class="hidden transition-opacity duration-500 opacity-0">
        <section class="mb-6 md:mb-10">
          <p
            class="text-zinc-500 uppercase tracking-widest text-[10px] md:text-xs font-bold mb-2 sans"
          >
            Current Location
          </p>
          <h2
            id="loc"
            class="text-3xl md:text-5xl lg:text-6xl font-semibold mb-3 tracking-tight leading-tight text-white"
          >
            ---
          </h2>
          <div class="flex items-center gap-4 md:gap-6">
            <div class="flex items-baseline gap-1 md:gap-2">
              <span
                id="temp"
                class="text-6xl md:text-7xl lg:text-8xl font-extrabold text-[#ff3e00] tracking-tighter"
                >--</span
              >
              <span class="text-2xl md:text-4xl font-light text-zinc-600"
                >°C</span
              >
            </div>
            <div id="icon-container" class="shrink-0">
              <svg
                class="icon-flat"
                viewBox="0 0 512 512"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M256 160c-52.9 0-96 43.1-96 96s43.1 96 96 96 96-43.1 96-96-43.1-96-96-96zm246.4 105.9l-44.5 25.7 17.8 47.9c5 13.6-2.1 28.6-15.7 33.5s-28.6-2.1-33.5-15.7l-17.9-48.2-51.2 51.2 25.7 44.5c6.9 11.9 2.8 27.1-9.1 34s-27.1 2.8-34-9.1l-25.9-44.8-13 48.3c-3.6 13.5-17.4 21.6-30.9 18s-21.6-17.4-18-30.9l13.1-48.7-44.8 25.9c-11.9 6.9-27.1 2.8-34-9.1s-2.8-27.1 9.1-34l44.5-25.7-48.3-13c-13.5-3.6-21.6-17.4-18-30.9s17.4-21.6 30.9-18l48.7 13.1-25.9-44.8c-6.9-11.9-2.8-27.1 9.1-34s27.1-2.8 34 9.1l25.7 44.5 13-48.3c3.6-13.5 17.4-21.6 30.9-18s21.6 17.4 18 30.9l-13.1 48.7 44.8-25.9c11.9-6.9 27.1-2.8 34 9.1s2.8 27.1-9.1 34l-44.5 25.7 48.3 13c13.5 3.6 21.6 17.4 18 30.9s-17.4 21.6-30.9 18l-48.7-13.1 25.9-44.8c6.9 11.9 2.8 27.1-9.1 34s-27.1 2.8-34-9.1l-25.7-44.5-13 48.3c-3.6 13.5-17.4 21.6-30.9 18s-21.6-17.4-18-30.9l13.1-48.7-44.8 25.9c-11.9 6.9-27.1 2.8-34-9.1s-2.8-27.1 9.1-34l44.5-25.7-48.3-13c-13.5-3.6-21.6-17.4-18-30.9s17.4-21.6 30.9-18l48.7 13.1-25.9-44.8c-6.9-11.9-2.8-27.1 9.1-34s27.1-2.8 34 9.1l25.7 44.5 13-48.3c3.6-13.5 17.4-21.6 30.9-18s21.6 17.4 18 30.9l-13.1 48.7 44.8-25.9c11.9-6.9 27.1-2.8 34 9.1s2.8 27.1-9.1 34l-44.5 25.7z"
                />
              </svg>
            </div>
          </div>
        </section>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 md:mb-10">
          <div
            class="p-4 md:p-5 rounded-2xl bg-zinc-900 border border-zinc-800 orange-glow"
          >
            <p
              class="text-zinc-500 text-[10px] font-bold uppercase mb-1 tracking-widest sans"
            >
              Wind
            </p>
            <p class="text-lg md:text-xl font-semibold">
              <span id="wind">0</span>
              <span class="text-xs font-light text-zinc-500">km/h</span>
            </p>
          </div>
          <div
            class="p-4 md:p-5 rounded-2xl bg-zinc-900 border border-zinc-800"
          >
            <p
              class="text-zinc-500 text-[10px] font-bold uppercase mb-1 tracking-widest sans"
            >
              Humidity
            </p>
            <p class="text-lg md:text-xl font-semibold">
              <span id="humidity">--</span>
              <span class="text-xs font-light text-zinc-500">%</span>
            </p>
          </div>
          <div
            class="p-4 md:p-5 rounded-2xl bg-zinc-900 border border-zinc-800"
          >
            <p
              class="text-zinc-500 text-[10px] font-bold uppercase mb-1 tracking-widest sans"
            >
              Pressure
            </p>
            <p class="text-lg md:text-xl font-semibold">
              <span id="pressure">--</span>
              <span class="text-xs font-light text-zinc-500">hPa</span>
            </p>
          </div>
          <div
            class="p-4 md:p-5 rounded-2xl bg-zinc-900 border border-zinc-800"
          >
            <p
              class="text-zinc-500 text-[10px] font-bold uppercase mb-1 tracking-widest sans"
            >
              UV Index
            </p>
            <p class="text-lg md:text-xl font-semibold">
              <span id="uv">--</span>
            </p>
          </div>
        </div>

        <div class="mb-6 md:mb-10">
          <p
            class="text-zinc-500 text-[10px] font-bold uppercase mb-2 tracking-widest sans"
          >
            Atmospheric Condition
          </p>
          <p id="cond" class="text-xl md:text-2xl font-semibold text-zinc-200">
            ---
          </p>
        </div>
      </main>

      <footer class="mt-4 md:mt-0">
        <div class="relative flex items-center group">
          <input
            type="text"
            id="query"
            placeholder="Search city..."
            class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-5 py-4 text-base md:text-lg text-white placeholder-zinc-600 transition-all sans pr-14"
          />
          <button
            onclick="updateWeather()"
            class="absolute right-2 bg-[#ff3e00] hover:bg-[#ff5e2b] w-10 h-10 flex items-center justify-center rounded-lg text-white transition-all duration-300 sans"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </button>
        </div>
      </footer>
    </div>

    <script>
      const codes = {
        0: "Clear",
        1: "Fair",
        2: "Partly Cloudy",
        3: "Overcast",
        45: "Fog",
        48: "Rime Fog",
        51: "Light Drizzle",
        61: "Rainy",
        71: "Snowy",
        95: "Stormy",
      };

      function createClouds() {
        const layer = document.getElementById("cloud-layer");
        const count = 5;
        for (let i = 0; i < count; i++) {
          const cloud = document.createElement("div");
          cloud.className = "cloud";
          const size = Math.random() * 150 + 100;
          const top = Math.random() * 70;
          const duration = Math.random() * 50 + 40;
          const delay = Math.random() * -100;
          cloud.style.width = `${size}px`;
          cloud.style.height = `${size / 2}px`;
          cloud.style.top = `${top}%`;
          cloud.style.animationDuration = `${duration}s`;
          cloud.style.animationDelay = `${delay}s`;
          layer.appendChild(cloud);
        }
      }

      document
        .getElementById("query")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") updateWeather();
        });

      function toggleLoading(isLoading) {
        const ghost = document.getElementById("ghost-loader");
        const app = document.getElementById("app");
        if (isLoading) {
          ghost.classList.remove("hidden");
          app.classList.add("hidden");
          app.classList.replace("opacity-100", "opacity-0");
        } else {
          ghost.classList.add("hidden");
          app.classList.remove("hidden");
          setTimeout(
            () => app.classList.replace("opacity-0", "opacity-100"),
            50,
          );
        }
      }

      async function init() {
        createClouds();
        toggleLoading(true);
        try {
          const res = await fetch("/discover");
          const data = await res.json();
          render(data);
        } catch (e) {
          console.error(e);
          render({ error: "Network Error" });
        }
      }

      async function updateWeather() {
        const city = document.getElementById("query").value;
        if (!city) return;
        toggleLoading(true);
        try {
          const res = await fetch("/weather", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ city }),
          });
          const data = await res.json();
          render(data);
        } catch (e) {
          console.error(e);
          render({ error: "Fetch failed" });
        }
      }

      function render(data) {
        const locEl = document.getElementById("loc");

        if (!data || data.error) {
          locEl.innerText = data?.error || "Unknown Location";
          locEl.classList.add("text-zinc-500");

          // Clear existing values on error
          document.getElementById("temp").innerText = "--";
          document.getElementById("wind").innerText = "0";
          document.getElementById("humidity").innerText = "--";
          document.getElementById("pressure").innerText = "--";
          document.getElementById("uv").innerText = "--";
          document.getElementById("cond").innerText = "Unavailable";

          toggleLoading(false);
          return;
        }

        locEl.innerText = data.location || "Resolved Location";
        locEl.classList.remove("text-zinc-500");

        const w = data.weather || {};

        document.getElementById("temp").innerText =
          w.temperature !== undefined ? Math.round(w.temperature) : "--";
        document.getElementById("wind").innerText =
          w.windspeed !== undefined ? w.windspeed : "0";
        document.getElementById("humidity").innerText =
          w.relative_humidity || w.humidity || "--";
        document.getElementById("pressure").innerText = w.surface_pressure
          ? Math.round(w.surface_pressure)
          : w.pressure || "--";
        document.getElementById("uv").innerText =
          w.uv_index !== undefined ? w.uv_index : "--";
        document.getElementById("cond").innerText =
          codes[w.weathercode] || "Variable";

        toggleLoading(false);
      }

      init();
    </script>
  </body>
</html>
